baseURL = 'https://noelle-it.com/'
languageCode = 'de-de'
title = 'Noelle IT'
theme = 'PaperMod'

[markup.goldmark.renderer]
    unsafe = true 

[params]
    env = 'production'
    defaultTheme = 'light'
    showThemeToggleButton = false 
    
    description = 'Noelle IT – E-Commerce Automatisierung & Billbee Expertise'
    author = 'Jonas Nölle'

    [params.profileMode]
        enabled = true
        title = "Noelle IT"
        subtitle = """
**Hier entsteht gerade meine neue Webpräsenz.**

Ich unterstütze Sie weiterhin bei der Optimierung und Automatisierung Ihrer E-Commerce-Prozesse (Schwerpunkt Billbee). 

Haben Sie ein Projekt oder eine Anfrage? Ich freue mich auf Ihre Nachricht.
"""
        
        [[params.profileMode.buttons]]
            name = 'Kontakt aufnehmen'
            url = 'mailto:kontakt@noelle-it.com'

    [[params.socialIcons]]
        name = 'email'
        url = 'mailto:kontakt@noelle-it.com'

# Das Menü bleibt vorerst leer/deaktiviert für den WIP-Status
[menu]
    [[menu.footer]]
        name = "AGB"
        url = "/agb/"
        weight = 20
        
    [[menu.footer]]
        name = "Datenschutz"
        url = "/datenschutz/"
        weight = 30    
        
    [[menu.footer]]
        name = 'Impressum'
        url = '/impressum/'
        weight = 40
